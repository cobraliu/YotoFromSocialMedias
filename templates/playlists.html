<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 Yoto 歌单 · V2M</title>
  <style>
    :root{
      --bg:#0a0a0a; --s1:#141414; --s2:#1d1d1d; --bd:#272727;
      --ac:#7c6af7; --ac2:#a594f9; --tx:#efefef; --mu:#606060;
      --ok:#22c55e; --er:#f87171;
      color-scheme: dark;
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--tx);
      font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    header{
      display:flex; align-items:center; gap:12px; padding:14px 18px;
      background:var(--s1); border-bottom:1px solid var(--bd);
      position:sticky; top:0; z-index:5;
    }
    .back{
      background:var(--s2); border:1px solid var(--bd); border-radius:8px;
      color:var(--tx); font-size:14px; padding:6px 12px; cursor:pointer; text-decoration:none;
    }
    .back:hover{border-color:var(--ac); color:var(--ac2)}
    h1{font-size:17px; margin:0; font-weight:600}
    .spacer{flex:1}
    main{max-width:720px; margin:0 auto; padding:16px}
    .msg{color:var(--mu); font-size:14px; text-align:center; padding:40px 16px; line-height:1.7}
    .msg a{color:var(--ac2); text-decoration:none}
    /* playlist list */
    .pl{
      display:flex; align-items:center; gap:12px; padding:12px 14px; margin-bottom:10px;
      background:var(--s1); border:1px solid var(--bd); border-radius:12px; cursor:pointer;
    }
    .pl:hover{border-color:var(--ac)}
    .pl-title{flex:1; font-size:15px; font-weight:500; word-break:break-word}
    .pl-meta{font-size:12px; color:var(--mu); white-space:nowrap}
    .chev{color:var(--mu); font-size:18px}
    /* detail */
    .d-head{margin-bottom:14px}
    .d-title{font-size:20px; font-weight:600; margin:0 0 4px; word-break:break-word}
    .d-sub{font-size:13px; color:var(--mu)}
    .chapter{
      background:var(--s1); border:1px solid var(--bd); border-radius:12px;
      padding:12px 14px; margin-bottom:10px;
    }
    .ch-head{display:flex; align-items:center; gap:10px; margin-bottom:8px}
    .ch-icon{width:32px; height:32px; border-radius:6px; background:var(--s2); flex-shrink:0;
      image-rendering:pixelated; object-fit:contain; border:1px solid var(--bd)}
    .ch-icon.empty{display:inline-block}
    .ch-title{flex:1; font-size:15px; font-weight:600; word-break:break-word}
    .ch-dur{font-size:12px; color:var(--mu); white-space:nowrap}
    .track{
      display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:8px;
      font-size:14px;
    }
    .track:nth-child(odd){background:var(--s2)}
    .tk-idx{color:var(--mu); font-size:12px; width:22px; text-align:right; flex-shrink:0}
    .tk-title{flex:1; word-break:break-word}
    .tk-fmt{font-size:11px; color:var(--mu); text-transform:uppercase}
    .tk-dur{font-size:12px; color:var(--mu); white-space:nowrap}
    .loading{color:var(--mu); text-align:center; padding:30px; font-size:14px}
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">← 返回</a>
    <h1 id="hdr-title">我的 Yoto 歌单</h1>
    <div class="spacer"></div>
    <button class="back" id="back-list" style="display:none" onclick="showList()">歌单列表</button>
  </header>
  <main id="root">
    <div class="loading">加载中…</div>
  </main>

  <script>
    const root = document.getElementById('root');
    function esc(s){ return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtDur(sec){
      sec = Math.round(sec || 0);
      const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
      const mm = String(m).padStart(h?2:1,'0'), ss = String(s).padStart(2,'0');
      return h ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
    }

    async function boot(){
      let me;
      try {
        const r = await fetch('/api/auth/me');
        if (!r.ok) { location.href = '/login'; return; }
        me = await r.json();
      } catch (e) { location.href = '/login'; return; }
      // Gate on Yoto auth: the page is only meaningful when Yoto is linked.
      let status = null;
      try { status = await (await fetch('/api/yoto/status')).json(); } catch (e) {}
      if (!status || !status.authed) {
        root.innerHTML = '<div class="msg">请先登录 Yoto 账号后再查看歌单。<br>'
          + '<a href="/">返回首页绑定 / 登录 Yoto</a></div>';
        return;
      }
      showList();
    }

    async function showList(){
      document.getElementById('back-list').style.display = 'none';
      document.getElementById('hdr-title').textContent = '我的 Yoto 歌单';
      root.innerHTML = '<div class="loading">加载歌单中…</div>';
      let data;
      try {
        const r = await fetch('/api/yoto/playlists');
        data = await r.json();
        if (!r.ok) throw new Error(data.error || '加载失败');
      } catch (e) {
        root.innerHTML = `<div class="msg">加载失败：${esc(e.message)}</div>`;
        return;
      }
      const items = data.playlists || [];
      if (!items.length){
        root.innerHTML = '<div class="msg">还没有歌单。</div>';
        return;
      }
      // The library summary omits chapters, so n_tracks is only reliable when
      // > 0; show duration always and the count only when we actually have it.
      root.innerHTML = items.map(p => {
        const meta = (p.n_tracks ? `${p.n_tracks} 首 · ` : '') + fmtDur(p.duration);
        return `<div class="pl" data-id="${esc(p.id)}">
          <div class="pl-title">${esc(p.title)}</div>
          <div class="pl-meta">${meta}</div>
          <span class="chev">›</span>
        </div>`;
      }).join('');
      root.querySelectorAll('.pl').forEach(el =>
        el.addEventListener('click', () => showDetail(el.dataset.id)));
      // Fill in song counts the library summary didn't provide, by lazily
      // reading each card's detail (throttled so we don't flood the API).
      enrichCounts(items.filter(p => !p.n_tracks));
    }

    async function enrichCounts(items){
      const els = {};
      root.querySelectorAll('.pl').forEach(el => { els[el.dataset.id] = el; });
      const queue = items.slice();
      const worker = async () => {
        while (queue.length){
          const p = queue.shift();
          const el = els[p.id];
          if (!el) continue;
          try {
            const r = await fetch('/api/yoto/playlists/' + encodeURIComponent(p.id));
            const d = await r.json();
            if (!r.ok) continue;
            const n = (d.chapters || []).reduce((a, c) => a + (c.tracks || []).length, 0);
            const m = el.querySelector('.pl-meta');
            if (m) m.textContent = `${n} 首 · ${fmtDur(d.duration || p.duration)}`;
          } catch (e) { /* leave the duration-only line as-is */ }
        }
      };
      await Promise.all([worker(), worker(), worker()]);
    }

    async function showDetail(id){
      document.getElementById('back-list').style.display = '';
      root.innerHTML = '<div class="loading">加载歌曲中…</div>';
      let d;
      try {
        const r = await fetch('/api/yoto/playlists/' + encodeURIComponent(id));
        d = await r.json();
        if (!r.ok) throw new Error(d.error || '加载失败');
      } catch (e) {
        root.innerHTML = `<div class="msg">加载失败：${esc(e.message)}</div>`;
        return;
      }
      document.getElementById('hdr-title').textContent = d.title || '歌单';
      const chapters = d.chapters || [];
      const nTracks = chapters.reduce((a, c) => a + (c.tracks || []).length, 0);
      let html = `<div class="d-head">
        <h2 class="d-title">${esc(d.title)}</h2>
        <div class="d-sub">${nTracks} 首 · ${fmtDur(d.duration)}</div>
      </div>`;
      if (!chapters.length){
        html += '<div class="msg">这个歌单还没有歌曲。</div>';
      }
      html += chapters.map(ch => {
        const icon = ch.icon
          ? `<img class="ch-icon" src="${esc(ch.icon)}" alt="" loading="lazy">`
          : `<span class="ch-icon empty"></span>`;
        const tracks = (ch.tracks || []).map((t, i) => `
          <div class="track">
            <span class="tk-idx">${i + 1}</span>
            <span class="tk-title">${esc(t.title)}</span>
            <span class="tk-fmt">${esc(t.format || '')}</span>
            <span class="tk-dur">${fmtDur(t.duration)}</span>
          </div>`).join('');
        return `<div class="chapter">
          <div class="ch-head">
            ${icon}
            <span class="ch-title">${esc(ch.title)}</span>
            <span class="ch-dur">${fmtDur(ch.duration)}</span>
          </div>
          ${tracks}
        </div>`;
      }).join('');
      root.innerHTML = html;
    }

    boot();
  </script>
</body>
</html>
