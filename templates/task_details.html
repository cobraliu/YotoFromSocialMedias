<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务详情</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --s1:#141414;
  --s2:#1d1d1d;
  --bd:#272727;
  --ac:#7c6af7;
  --ac2:#a594f9;
  --tx:#efefef;
  --mu:#606060;
  --ok:#22c55e;
  --er:#f87171;
  --warn:#f59e0b;
}
body{
  background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;line-height:1.5;min-height:100vh;padding-bottom:60px;
}
a{color:inherit;text-decoration:none}

/* ── Nav ── */
.nav{
  background:var(--s1);border-bottom:1px solid var(--bd);
  height:54px;display:flex;align-items:center;padding:0 16px;gap:12px;
  position:sticky;top:0;z-index:50;
}
.back{
  display:flex;align-items:center;gap:5px;font-size:14px;color:var(--mu);
  padding:6px 10px;border-radius:8px;border:1px solid transparent;
  cursor:pointer;flex-shrink:0;transition:background .12s,color .12s;
}
.back:hover{background:var(--s2);color:var(--tx)}
.nav-title{font-size:16px;font-weight:600;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Layout ── */
.wrap{max-width:820px;margin:0 auto;padding:20px 16px}
.card{
  background:var(--s1);border:1px solid var(--bd);border-radius:16px;
  padding:20px;margin-bottom:14px;
}
.card-hd{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--mu);margin-bottom:14px;
}

/* ── Status card ── */
.st-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.st-badge{font-size:13px;padding:4px 12px;border-radius:20px;font-weight:500}
.st-ok  {background:rgba(34,197,94,.12);color:var(--ok)}
.st-er  {background:rgba(248,113,113,.12);color:var(--er)}
.st-ing {background:rgba(124,106,247,.12);color:var(--ac2)}
.st-msg {font-size:13px;color:var(--mu);margin-bottom:10px}
.pbar-bg{background:var(--s2);border-radius:3px;height:4px;overflow:hidden;margin-bottom:12px}
.pbar-fg{height:100%;background:var(--ac);border-radius:3px;transition:width .4s}
.pbar-fg.ok{background:var(--ok)}

/* ── Buttons ── */
.acts{display:flex;gap:10px;flex-wrap:wrap}
.btn-s{
  font-size:14px;padding:7px 16px;border-radius:9px;
  border:1px solid var(--bd);background:var(--s2);color:var(--tx);
  cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;
  text-decoration:none;transition:background .12s;
}
.btn-s:hover{background:var(--bd)}
.btn-s.ac{background:rgba(124,106,247,.1);border-color:rgba(124,106,247,.35);color:var(--ac2)}
.btn-s.ok{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--ok)}

/* ── Player ── */
.seek-wrap{position:relative;margin:4px 0 2px}
.seek{
  -webkit-appearance:none;appearance:none;
  width:100%;height:5px;border-radius:3px;
  background:var(--s2);cursor:pointer;outline:none;
}
.seek::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:var(--ac);cursor:pointer;
  transition:transform .1s;
}
.seek::-webkit-slider-thumb:hover{transform:scale(1.25)}
.seek::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--ac);cursor:pointer;border:none;
}
.time-row{display:flex;justify-content:space-between;font-size:12px;color:var(--mu);margin-bottom:10px}
.p-ctrl{display:flex;align-items:center;gap:14px}
.play-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--ac);color:#fff;border:none;
  font-size:18px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.play-btn:hover{background:var(--ac2)}
.vol-row{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.vol-ico{font-size:15px;color:var(--mu);flex-shrink:0;cursor:pointer}
.vol{
  -webkit-appearance:none;appearance:none;
  flex:1;height:4px;border-radius:3px;background:var(--s2);cursor:pointer;outline:none;
}
.vol::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--mu);
}
.speed-btn{
  font-size:12px;padding:4px 9px;border-radius:6px;
  background:var(--s2);border:1px solid var(--bd);color:var(--mu);
  cursor:pointer;flex-shrink:0;
}
.speed-btn:hover{color:var(--tx)}

/* ── Trim ── */
.trim-helper{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.hint-tx{font-size:12px;color:var(--mu)}
.btn-set{
  font-size:12px;padding:5px 12px;border-radius:7px;
  border:1px solid var(--bd);background:var(--s2);color:var(--mu);
  cursor:pointer;transition:color .1s,background .1s;
}
.btn-set:hover{background:var(--bd);color:var(--tx)}

.trim-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.field label{font-size:12px;color:var(--mu);display:block;margin-bottom:5px}
.text-in{
  width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:8px;
  padding:8px 12px;color:var(--tx);font-size:14px;outline:none;
  transition:border-color .15s;
}
.text-in:focus{border-color:var(--ac)}
.full-col{grid-column:1 / -1}

.btn-trim{
  background:var(--ac);color:#fff;border:none;border-radius:9px;
  padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  transition:background .15s,opacity .15s;
}
.btn-trim:hover{background:var(--ac2)}
.btn-trim:disabled{opacity:.5;cursor:default}
.trim-res{margin-top:12px;font-size:13px;min-height:24px}

/* ── Trim list ── */
.trim-row{
  background:var(--s2);border-radius:10px;padding:10px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:10px;
}
.trim-name{flex:1;min-width:0;font-size:14px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trim-meta{font-size:12px;color:var(--mu);white-space:nowrap;flex-shrink:0}

/* ── Log ── */
.log-box{
  background:#060606;border-radius:10px;padding:10px 12px;
  max-height:160px;overflow-y:auto;
}
.log-ln{font-size:11.5px;font-family:monospace;color:var(--mu);line-height:1.75}

/* ── Link modal ── */
.lm-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  display:flex;align-items:center;justify-content:center;
  z-index:900;padding:20px;
}
.lm-box{
  background:var(--s1);border:1px solid var(--bd);border-radius:16px;
  padding:22px;width:100%;max-width:480px;
}
.lm-hd{font-size:14px;font-weight:600;margin-bottom:12px}
.lm-hint{font-size:12px;color:var(--mu);margin-bottom:8px}
.lm-url{
  width:100%;background:var(--s2);border:1.5px solid var(--bd);
  border-radius:8px;padding:10px 12px;color:var(--tx);
  font-size:12px;font-family:monospace;outline:none;
  resize:none;line-break:anywhere;
}
.lm-url:focus{border-color:var(--ac)}
.lm-foot{display:flex;justify-content:flex-end;margin-top:14px}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:9px 20px;font-size:13px;
  opacity:0;pointer-events:none;z-index:999;
  transition:opacity .2s,transform .2s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.er{border-color:rgba(248,113,113,.4);color:var(--er)}
.toast.ok{border-color:rgba(34,197,94,.4);color:var(--ok)}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.2);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
}

/* ── Responsive ── */
@media(max-width:560px){
  .trim-grid{grid-template-columns:1fr}
  .full-col{grid-column:1}
  .vol-row{display:none}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="back" href="/">← 返回</a>
  <span class="nav-title" id="nav-title">任务详情</span>
</nav>

<div class="wrap">

  <!-- 状态 -->
  <div class="card">
    <div class="card-hd">下载状态</div>
    <div id="status-box"><div style="color:var(--mu);font-size:14px">加载中…</div></div>
  </div>

  <!-- 播放器 -->
  <div class="card" id="player-card" style="display:none">
    <div class="card-hd">音频播放</div>
    <audio id="audio" preload="metadata"></audio>
    <div class="seek-wrap">
      <input type="range" class="seek" id="seek" value="0" min="0" max="100" step="0.05">
    </div>
    <div class="time-row">
      <span id="cur-t">0:00</span>
      <span id="dur-t">0:00</span>
    </div>
    <div class="p-ctrl">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <div class="vol-row">
        <span class="vol-ico" onclick="toggleMute()" id="vol-ico">🔊</span>
        <input type="range" class="vol" id="vol" value="100" min="0" max="100">
      </div>
      <button class="speed-btn" id="speed-btn" onclick="cycleSpeed()">1×</button>
    </div>
  </div>

  <!-- 截取 -->
  <div class="card" id="trim-card" style="display:none">
    <div class="card-hd">音频截取</div>
    <div class="trim-helper">
      <button class="btn-set" onclick="setTrimPoint('start')">⌈ 设为开始</button>
      <button class="btn-set" onclick="setTrimPoint('end')">⌉ 设为结束</button>
      <span class="hint-tx">← 当前播放位置</span>
    </div>
    <div class="trim-grid">
      <div class="field">
        <label>开始时间（秒）</label>
        <input type="number" class="text-in" id="t-start" value="0" min="0" step="0.1">
      </div>
      <div class="field">
        <label>结束时间（秒）</label>
        <input type="number" class="text-in" id="t-end" value="" min="0" step="0.1" placeholder="结束">
      </div>
      <div class="field full-col">
        <label>保存文件名（不含扩展名）</label>
        <input type="text" class="text-in" id="t-name" placeholder="例：我的片段">
      </div>
    </div>
    <button class="btn-trim" id="trim-btn" onclick="doTrim()">✂ 截取</button>
    <div id="trim-res" class="trim-res"></div>
  </div>

  <!-- 已截取列表 -->
  <div class="card" id="trims-card" style="display:none">
    <div class="card-hd">已截取片段</div>
    <div id="trims-list"></div>
  </div>

  <!-- 日志 -->
  <div class="card" id="log-card" style="display:none">
    <div class="card-hd">下载日志</div>
    <div class="log-box" id="log-box"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div id="link-modal" class="lm-overlay" style="display:none" onclick="if(event.target===this)closeLinkModal()">
  <div class="lm-box">
    <div class="lm-hd">复制链接</div>
    <div class="lm-hint">长按或点击文本框全选，然后复制</div>
    <textarea id="lm-url" class="lm-url" rows="3" readonly
      onclick="this.select()" onfocus="this.select()"></textarea>
    <div class="lm-foot">
      <button class="btn-s" onclick="closeLinkModal()">关闭</button>
    </div>
  </div>
</div>

<script>
const TASK_ID = "{{ task_id }}";
let pollTimer = null;
let playerReady = false;
let origName = '';   // original audio name, for "<原名>_<片段名>" Yoto upload names
const SPEEDS = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx = 2; // default 1×

// ─── Helpers ──────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function fmtT(s) {
  s = Math.max(0, s || 0);
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ─── Load task ────────────────────────────────────────────
async function loadTask() {
  try {
    const r = await fetch(`/api/task-details/${TASK_ID}`);
    if (!r.ok) throw new Error('任务不存在');
    const d = await r.json();
    renderStatus(d.task_status);
    renderTrims(d.trims || []);

    if (d.task_status.is_downloading) {
      pollTimer = setInterval(async () => {
        const r2 = await fetch(`/api/status/${TASK_ID}`);
        const s2 = await r2.json();
        renderStatus(s2);
        if (!s2.is_downloading) {
          clearInterval(pollTimer);
          loadTask();
        }
      }, 2000);
    }
  } catch (e) {
    document.getElementById('status-box').innerHTML =
      `<div style="color:var(--er)">${esc(e.message)}</div>`;
  }
}

function renderStatus(s) {
  const done = !s.is_downloading && s.success;
  const err  = !s.is_downloading && !s.success;

  const filename = s.audio_filename || s.video_filename || '';
  origName = filename.replace(/\.[^.]+$/, '');   // for "<原名>_<片段名>" upload names
  document.getElementById('nav-title').textContent =
    filename || `任务 ${TASK_ID.slice(0, 8)}…`;

  const badgeCls = done ? 'st-ok' : err ? 'st-er' : 'st-ing';
  const badgeTx  = done ? '✅ 完成' : err ? '❌ 失败' : `⏳ 下载中 ${s.progress || 0}%`;

  let html = `
    <div class="st-row">
      <span class="st-badge ${badgeCls}">${badgeTx}</span>
    </div>
    ${s.is_downloading ? `
      <div class="pbar-bg">
        <div class="pbar-fg" style="width:${s.progress || 0}%"></div>
      </div>` : ''}
    <div class="st-msg">${esc(s.status || '')}</div>
  `;

  let acts = '';
  if (s.has_audio) {
    acts += `<a class="btn-s ac" href="/api/download/${TASK_ID}/audio.mp3" download>⬇ 下载音频</a>`;
    acts += `<button class="btn-s" onclick="copyLink('/api/download/${TASK_ID}/audio.mp3')">🔗 复制链接</button>`;
    initPlayer();
  }
  if (s.has_video) {
    acts += `<a class="btn-s" href="/api/download/${TASK_ID}/video" download>⬇ 下载视频</a>`;
  }
  if (acts) html += `<div class="acts">${acts}</div>`;

  document.getElementById('status-box').innerHTML = html;

  // Logs
  const logs = s.log_messages || [];
  if (logs.length) {
    document.getElementById('log-card').style.display = 'block';
    const lb = document.getElementById('log-box');
    lb.innerHTML = logs.map(l => `<div class="log-ln">${esc(l)}</div>`).join('');
    lb.scrollTop = lb.scrollHeight;
  }
}

// ─── Audio player ─────────────────────────────────────────
function initPlayer() {
  if (playerReady) return;
  playerReady = true;

  const a = document.getElementById('audio');
  a.src = `/api/play/${TASK_ID}/audio`;

  document.getElementById('player-card').style.display = 'block';
  document.getElementById('trim-card').style.display   = 'block';

  a.addEventListener('loadedmetadata', () => {
    const dur = a.duration;
    document.getElementById('seek').max = dur;
    document.getElementById('seek').step = 0.05;
    document.getElementById('dur-t').textContent = fmtT(dur);
    const tEnd = document.getElementById('t-end');
    if (!tEnd.value) tEnd.value = dur.toFixed(1);
  });

  a.addEventListener('timeupdate', () => {
    document.getElementById('seek').value = a.currentTime;
    document.getElementById('cur-t').textContent = fmtT(a.currentTime);
  });

  a.addEventListener('ended', () => {
    document.getElementById('play-btn').textContent = '▶';
  });

  document.getElementById('seek').addEventListener('input', e => {
    a.currentTime = parseFloat(e.target.value);
  });

  document.getElementById('vol').addEventListener('input', e => {
    a.volume = e.target.value / 100;
    document.getElementById('vol-ico').textContent = a.volume === 0 ? '🔇' : '🔊';
  });
}

function togglePlay() {
  const a = document.getElementById('audio');
  const btn = document.getElementById('play-btn');
  if (a.paused) { a.play(); btn.textContent = '⏸'; }
  else          { a.pause(); btn.textContent = '▶'; }
}

function toggleMute() {
  const a = document.getElementById('audio');
  a.muted = !a.muted;
  document.getElementById('vol-ico').textContent = a.muted ? '🔇' : '🔊';
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  const s = SPEEDS[speedIdx];
  document.getElementById('audio').playbackRate = s;
  document.getElementById('speed-btn').textContent = s + '×';
}

function setTrimPoint(which) {
  const cur = parseFloat(document.getElementById('audio').currentTime).toFixed(2);
  document.getElementById(which === 'start' ? 't-start' : 't-end').value = cur;
}

// ─── Trim ─────────────────────────────────────────────────
async function doTrim() {
  const start = parseFloat(document.getElementById('t-start').value) || 0;
  const end   = parseFloat(document.getElementById('t-end').value)   || 0;
  const name  = document.getElementById('t-name').value.trim();
  const btn   = document.getElementById('trim-btn');
  const res   = document.getElementById('trim-res');

  if (!name) { showToast('请输入文件名', 'er'); return; }
  if (end <= start) { showToast('结束时间需大于开始时间', 'er'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 截取中…';
  res.innerHTML = '';

  try {
    const r = await fetch('/api/trim-audio', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_id: TASK_ID, start_time: start, end_time: end, output_filename: name })
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || '截取失败');
    res.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px">
        <span style="color:var(--ok);font-size:13px">✓ 截取成功（${fmtT(start)} – ${fmtT(end)}）</span>
        <a class="btn-s ok" href="/api/download-trim/${d.trim_id}.mp3" download="${esc(d.filename)}">⬇ 下载</a>
      </div>`;
    showToast('截取成功', 'ok');
    loadTrimsOnly();
  } catch (e) {
    res.innerHTML = `<div style="color:var(--er)">${esc(e.message)}</div>`;
    showToast(e.message, 'er');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✂ 截取';
  }
}

async function loadTrimsOnly() {
  try {
    const r = await fetch(`/api/task-details/${TASK_ID}`);
    const d = await r.json();
    renderTrims(d.trims || []);
  } catch (_) {}
}

function renderTrims(trims) {
  const card = document.getElementById('trims-card');
  const list = document.getElementById('trims-list');
  if (!trims.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = trims.map(t => {
    const segStem = (t.output_filename || '').replace(/\.[^.]+$/, '');
    const upName = (origName ? origName + '_' : '') + segStem;
    return `
    <div class="trim-row">
      <span class="trim-name">${esc(t.output_filename)}</span>
      <span class="trim-meta">${fmtT(t.start_time)} – ${fmtT(t.end_time)}</span>
      <button class="btn-s" onclick="copyLink('/api/download-trim/${t.trim_id}.mp3')" title="复制链接">🔗</button>
      <a class="btn-s" href="/api/download-trim/${t.trim_id}.mp3"
         download="${esc(t.output_filename)}" title="下载">⬇</a>
      <a class="btn-s" href="/?yoto_trim=${encodeURIComponent(t.trim_id)}&name=${encodeURIComponent(upName)}"
         title="上传到 Yoto">⬆ Yoto</a>
    </div>
  `;
  }).join('');
}

// ─── Copy link ────────────────────────────────────────────
function copyLink(path) {
  const url = location.origin + path;
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(url)
      .then(() => showToast('链接已复制', 'ok'))
      .catch(() => showLinkModal(url));
  } else {
    showLinkModal(url);
  }
}
function showLinkModal(url) {
  const ta = document.getElementById('lm-url');
  ta.value = url;
  document.getElementById('link-modal').style.display = 'flex';
  setTimeout(() => { ta.focus(); ta.select(); }, 80);
}
function closeLinkModal() {
  document.getElementById('link-modal').style.display = 'none';
}

// ─── Init ─────────────────────────────────────────────────
loadTask();
</script>
</body>
</html>
